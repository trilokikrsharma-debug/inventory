; InvenBill Pro — PHP-FPM Pool Configuration

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; Logging
catch_workers_output = yes
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/www/html/logs/php-fpm-error.log
