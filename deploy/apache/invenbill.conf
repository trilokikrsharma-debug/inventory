<VirtualHost *:80>
    ServerName app.example.com
    ServerAlias *.example.com
    DocumentRoot /var/www/inventory
    ServerTokens Prod

    <Directory /var/www/inventory>
        AllowOverride All
        Require all granted
        Options -Indexes FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/invenbill_error.log
    CustomLog ${APACHE_LOG_DIR}/invenbill_access.log combined

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/?(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName app.example.com
    ServerAlias *.example.com
    DocumentRoot /var/www/inventory
    ServerTokens Prod

    <Directory /var/www/inventory>
        AllowOverride All
        Require all granted
        Options -Indexes FollowSymLinks
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem

    ErrorLog ${APACHE_LOG_DIR}/invenbill_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/invenbill_ssl_access.log combined

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    RewriteEngine On
    RewriteCond %{QUERY_STRING} (^|&)page=health(&|$) [NC]
    RewriteRule ^index\.php$ - [F,L]
</VirtualHost>
</IfModule>
