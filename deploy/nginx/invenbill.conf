##
# InvenBill SaaS - Nginx production vhost
# App root: /var/www/inventory
##

upstream invenbill_php {
    server unix:/run/php/php8.2-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.example.com *.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com *.example.com;

    root /var/www/inventory;
    index index.php;
    server_tokens off;
    client_body_buffer_size 32k;

    # TLS certificates (wildcard + apex/subdomain cert)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:20m;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;
    ssl_ecdh_curve X25519:secp384r1:secp256r1;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "0" always;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static asset caching
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Block hidden / sensitive files
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|ini|log|sql|bak|md|lock|xml|yml|yaml|neon)$ {
        deny all;
    }
    location ~ ^/(core|config|database|logs|cache|cli|models|controllers|views|vendor|tests)/ {
        deny all;
    }
    location = /health {
        return 403;
    }

    # Optional: keep health internal only by IP
    location = /index.php {
        if ($arg_page = health) {
            return 403;
        }
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "display_errors=0";
        fastcgi_pass invenbill_php;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "display_errors=0";
        fastcgi_pass invenbill_php;
        fastcgi_read_timeout 120s;
    }

    client_max_body_size 20m;
    disable_symlinks if_not_owner from=$document_root;
}
