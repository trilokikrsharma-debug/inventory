substitutions:
  _REGION: asia-south1
  _SERVICE: tsa-legacy-business-os
  _REPOSITORY: tsa-legacy
  _IMAGE: '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}'

steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_IMAGE}'
      - '--platform=managed'
      - '--region=${_REGION}'
      - '--allow-unauthenticated'
      - '--execution-environment=gen2'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--max-instances=200'
      - '--min-instances=2'
      - '--concurrency=80'
      - '--set-env-vars=APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr'

images:
  - '${_IMAGE}'
