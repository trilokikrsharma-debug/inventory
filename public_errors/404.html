<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0b1220; color: #e6edf8; display: grid; min-height: 100vh; place-items: center; }
        .card { max-width: 560px; padding: 32px; border-radius: 16px; background: #111c31; border: 1px solid #263a60; text-align: center; }
        h1 { margin: 0 0 10px; font-size: 2rem; }
        p { margin: 0; line-height: 1.6; color: #b9c9e6; }
    </style>
</head>
<body>
    <main class="card">
        <h1>404</h1>
        <p>The page you requested does not exist.</p>
    </main>
</body>
</html>
