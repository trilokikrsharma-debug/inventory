name: InvenBill Pro CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.2'

jobs:
  # ─── Stage 1: Code Quality ───────────────────────────
  lint:
    name: PHP Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, gd, mbstring, redis, zip, intl

      - name: PHP Syntax Check
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -n1 php -l

  # ─── Stage 2: Tests ──────────────────────────────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventory_billing_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, gd, mbstring, redis, zip, intl, bcmath
          coverage: xdebug

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: inventory_billing_test
          DB_USER: root
          DB_PASS: root
          REDIS_ENABLED: 1
          REDIS_HOST: 127.0.0.1
          APP_ENV: testing
        run: vendor/bin/phpunit --testdox --colors=always

  # ─── Stage 3: Static Analysis ────────────────────────
  static-analysis:
    name: PHPStan Analysis
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, gd, mbstring, redis, zip, intl

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress

  # ─── Stage 4: Security Scan ──────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded credentials
        run: |
          echo "Scanning for hardcoded secrets..."
          ! grep -rn "password.*=.*['\"][^'\"]*['\"]" config/ --include="*.php" | grep -v "getenv\|PASSWORD_MIN\|PASSWORD_COMPLEX\|password_hash\|password_verify\|password_reset\|password_changed\|password'"

      - name: Check for debug functions
        run: |
          echo "Scanning for debug functions in production code..."
          ! grep -rn "var_dump\|print_r\|die(" controllers/ models/ core/ --include="*.php" | grep -v "//\|/\*\|die('Access\|die();"

  # ─── Stage 5: Build Docker Image ─────────────────────
  build:
    name: Build & Test Container
    runs-on: ubuntu-latest
    needs: [test, static-analysis, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t invenbill-pro:${{ github.sha }} .

      - name: Container Smoke Test
        run: |
          docker run -d --name smoke-test -p 8080:80 invenbill-pro:${{ github.sha }}
          sleep 8
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/index.php?page=health || echo "000")
          echo "Health check HTTP status: $STATUS"
          docker logs smoke-test
          docker stop smoke-test
          if [ "$STATUS" != "200" ]; then echo "Health check failed"; exit 1; fi

  # ─── Stage 6: Deploy ─────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - name: Deploy to staging server
        run: echo "Deploy to staging via SSH/rsync/container registry"
        # ssh $STAGING_HOST "cd /app && git pull && docker-compose up -d --build"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to production
        run: echo "Deploy to production via blue-green deployment"
        # 1. Push image to registry
        # 2. Update load balancer to new instances
        # 3. Health check new instances
        # 4. Drain old instances
